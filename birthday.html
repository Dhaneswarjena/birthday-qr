<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    h1 {
      color: #ffcc00;
      font-size: 40px;
      margin-top: 20px;
    }
    iframe {
      margin-top: 20px;
      width: 90%;
      max-width: 400px;
      height: 220px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <h1>🎂 Happy Birthday 🎉</h1>
  <p>Enjoy your special day 🥳</p>

  <!-- 🎬 YouTube Birthday Video -->
  <audio id="music" autoplay loop>
    <source src="https://pixabay.com/music/electronic-happy-birthday-495860/.mp3" type="audio/mp3">
  </audio>
<script>
    window.onload = function () {
      let audio = document.getElementById("music");

      // Try to unmute and play
      audio.muted = false;
      audio.play().catch(() => {
        console.log("Autoplay blocked");
      });
    };

    // Fallback: play on first touch
    document.addEventListener("click", function () {
      let audio = document.getElementById("music");
      audio.muted = false;
      audio.play();
    });
  </script>

</body>
</html>
