<!doctype html>
<html>
  <head>
    <title>Scan for Birthday 🎉</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        text-align: center;
        font-family: Arial;
        background: #111;
        color: white;
        padding: 20px;
      }
      h1 {
        margin-top: 40px;
        color: #ffcc00;
      }
      p {
        font-size: 18px;
      }
      .box {
        background: #222;
        padding: 20px;
        border-radius: 12px;
        margin-top: 20px;
      }
      img {
        width: 250px;
        margin-top: 20px;
        border-radius: 10px;
        background: white;
        padding: 10px;
      }
      a {
        color: #00ffcc;
        text-decoration: none;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <h1>🎁 Birthday Surprise 🎂</h1>

    <div class="box">
      <p>🔗 Open this link:</p>
      <a href="https://dhaneswarjena.github.io/birthday-qr" target="_blank">
        https://yourname.github.io/birthday-qr
      </a>

      <p>👇 Or scan below 👇</p>

      <!-- Replace this QR image with your generated QR -->
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://dhaneswarjena.github.io/birthday-qr"
        alt="QR Code"
      />

      <p>📱 Scan it for wishing Happy Birthday 🎉</p>
    </div>
  </body>
</html>
